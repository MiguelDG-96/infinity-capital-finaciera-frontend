<!-- Backdrop para cerrar al hacer clic fuera -->
<div 
  class="backdrop-fade"
  [class.visible]="notificationService.isOpen()"
  (click)="close()"
></div>

<!-- Drawer Lateral -->
<div 
  class="drawer-container"
  [class.open]="notificationService.isOpen()"
>
  <!-- Header del Drawer -->
  <div class="flex items-center justify-between border-b border-base-300 p-4">
    <h3 class="text-lg font-bold text-base-content flex items-center gap-2">
      <lucide-icon name="bell" size="20" class="text-primary"></lucide-icon>
      Notificaciones
    </h3>
    <button 
      class="btn btn-ghost btn-sm btn-circle" 
      (click)="close()"
      aria-label="Cerrar"
    >
      <lucide-icon name="x" size="20"></lucide-icon>
    </button>
  </div>

  <!-- Contenido de Notificaciones -->
  <div class="h-[calc(100%-64px)] overflow-y-auto p-4 custom-scrollbar">
    @if (notifications.length > 0) {
      <div class="flex flex-col gap-4">
        @for (item of notifications; track item.id) {
          <div class="group relative flex flex-col gap-1 rounded-xl bg-base-200/40 p-3 hover:bg-base-200 notification-item">
            <div class="flex items-start justify-between">
              <div class="flex items-center gap-2">
                <div [class]="'flex h-8 w-8 items-center justify-center rounded-lg ' + 
                  (item.type === 'success' ? 'bg-success/20 text-success' : 
                   item.type === 'warning' ? 'bg-warning/20 text-warning' : 
                   'bg-info/20 text-info')">
                  <lucide-icon [name]="item.icon" size="16"></lucide-icon>
                </div>
                <span class="text-xs font-bold text-base-content">{{ item.title }}</span>
              </div>
              <span class="text-[10px] text-base-content/30">{{ item.time }}</span>
            </div>
            <p class="text-[11px] text-base-content/60 leading-relaxed">{{ item.description }}</p>
          </div>
        }
      </div>
    } @else {
      <div class="flex h-full flex-col items-center justify-center gap-2 text-base-content/40">
        <lucide-icon name="bell-off" size="48" strokeWidth="1"></lucide-icon>
        <p class="text-sm">No tienes notificaciones</p>
      </div>
    }
  </div>
</div>
