<div class="modal modal-open">
  <div class="modal-box bg-base-100 max-w-md border border-base-content/10 shadow-2xl rounded-3xl">
    
    <div class="flex justify-between items-center mb-6">
      <h3 class="font-black text-xl flex items-center gap-2">
        <lucide-icon name="coins" class="text-primary w-6 h-6"></lucide-icon>
        Abono Global #{{ credito.id }}
      </h3>
      <button class="btn btn-ghost btn-sm btn-circle" (click)="cerrar.emit()">
        <lucide-icon name="x" class="w-4 h-4"></lucide-icon>
      </button>
    </div>

    <form [formGroup]="pagoForm" (ngSubmit)="confirmarPago()" class="space-y-4">
      
      @if (error()) {
        <div class="alert alert-error bg-error/10 border-error/20 text-error text-sm rounded-2xl py-2 px-3 animate-shake">
          <lucide-icon name="alert-triangle" class="h-4 w-4"></lucide-icon>
          <span>{{ error() }}</span>
        </div>
      }

      <div class="form-control">
        <label class="label"><span class="label-text font-bold text-[10px] uppercase opacity-50">Monto del Abono</span></label>
        <div class="relative group">
            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-base-content/40 font-bold group-focus-within:text-primary transition-colors">S/</div>
            <input type="number" 
                   formControlName="monto" 
                   class="input input-bordered w-full pl-10 rounded-2xl font-black text-xl transition-all"
                   [class.input-error]="isFieldInvalid('monto')"
                   step="0.01">
        </div>
        @if (isFieldInvalid('monto')) {
            <label class="label pb-0">
                <span class="text-[10px] text-error font-bold italic">Ingresa un monto válido mayor a 0</span>
            </label>
        }
      </div>

      <div class="form-control">
        <label class="label"><span class="label-text font-bold text-[10px] uppercase opacity-50">Método de Pago</span></label>
        <select formControlName="metodoPago" class="select select-bordered w-full rounded-2xl">
          <option value="EFECTIVO">Efectivo</option>
          <option value="YAPE">Yape</option>
          <option value="PLIN">Plin</option>
          <option value="TRANSFERENCIA">Transferencia</option>
          <option value="DEPOSITO">Depósito</option>
          <option value="SALDO_BILLETERA">Billetera Virtual</option>
        </select>
      </div>

      @if (pagoForm.get('metodoPago')?.value !== 'EFECTIVO') {
        <div class="form-control animate-fade-in">
          <label class="label"><span class="label-text font-bold text-[10px] uppercase opacity-50">N° Comprobante / Operación</span></label>
          <input type="text" 
                 formControlName="numeroComprobante" 
                 class="input input-bordered w-full rounded-2xl"
                 [class.input-error]="isFieldInvalid('numeroComprobante')"
                 placeholder="Ej. 12345678">
          @if (isFieldInvalid('numeroComprobante')) {
              <label class="label pb-0">
                  <span class="text-[10px] text-error font-bold italic">El comprobante es requerido</span>
              </label>
          }
        </div>
      }

      <div class="modal-action pt-4 flex gap-2">
        <button type="button" class="btn btn-ghost rounded-2xl flex-1" (click)="cerrar.emit()" [disabled]="enviando()">Cancelar</button>
        <button type="submit" class="btn btn-primary px-8 rounded-2xl shadow-lg shadow-primary/20 flex-1" [disabled]="pagoForm.invalid || enviando()">
          @if (enviando()) {
            <span class="loading loading-spinner loading-xs"></span>
          }
          Procesar Abono
        </button>
      </div>
    </form>
  </div>
</div>
