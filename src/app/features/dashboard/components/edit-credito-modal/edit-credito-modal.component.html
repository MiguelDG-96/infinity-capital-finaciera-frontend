<div class="modal modal-open">
  <div class="modal-box bg-base-100 max-w-sm border border-base-content/10 shadow-2xl rounded-3xl p-6">
    <div class="flex justify-between items-center mb-6">
      <h3 class="font-black text-xl flex items-center gap-2">
        <lucide-icon name="edit-2" class="text-primary w-6 h-6"></lucide-icon>
        Editar Crédito #{{ credito.id }}
      </h3>
      <button class="btn btn-ghost btn-sm btn-circle" (click)="cerrar.emit()">
        <lucide-icon name="x" class="w-4 h-4"></lucide-icon>
      </button>
    </div>

    <form (ngSubmit)="guardar()" class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div class="form-control">
          <label class="label"
            ><span class="label-text font-bold text-[10px] uppercase opacity-50"
              >Monto Aprobado</span
            ></label
          >
          <input
            type="number"
            [(ngModel)]="editReq.montoAprobado"
            name="montoAprobado"
            class="input input-bordered w-full rounded-2xl"
            step="0.01"
          />
        </div>
        <div class="form-control">
          <label class="label"
            ><span class="label-text font-bold text-[10px] uppercase opacity-50"
              >Tasa (TEM %)</span
            ></label
          >
          <input
            type="number"
            [(ngModel)]="editReq.tem"
            name="tem"
            class="input input-bordered w-full rounded-2xl"
            step="0.01"
          />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="form-control">
          <label class="label"
            ><span class="label-text font-bold text-[10px] uppercase opacity-50"
              >Plazo (Meses)</span
            ></label
          >
          <input
            type="number"
            [(ngModel)]="editReq.plazoMeses"
            name="plazoMeses"
            class="input input-bordered w-full rounded-2xl"
          />
        </div>
        <div class="form-control">
          <label class="label"
            ><span class="label-text font-bold text-[10px] uppercase opacity-50"
              >Estado Crédito</span
            ></label
          >
          <select
            [(ngModel)]="editReq.estado"
            name="estado"
            class="select select-bordered w-full rounded-2xl"
          >
            <option value="SOLICITADO">SOLICITADO</option>
            <option value="EN_EVALUACION">EN EVALUACION</option>
            <option value="APROBADO">APROBADO</option>
            <option value="RECHAZADO">RECHAZADO</option>
            <option value="ACTIVO">ACTIVO</option>
            <option value="PAGADO">PAGADO</option>
            <option value="ATRASADO">ATRASADO</option>
            <option value="MORA">MORA</option>
            <option value="RESUELTO">RESUELTO</option>
          </select>
        </div>
      </div>

      <div class="form-control">
        <label class="label"
          ><span class="label-text font-bold text-[10px] uppercase opacity-50"
            >Observación Evaluador</span
          ></label
        >
        <textarea
          [(ngModel)]="editReq.observacionEvaluador"
          name="observacionEvaluador"
          class="textarea textarea-bordered w-full rounded-2xl"
          rows="3"
        ></textarea>
      </div>

      <div class="modal-action pt-4 flex flex-wrap gap-2">
        <button
          type="button"
          class="btn btn-warning btn-outline rounded-2xl flex-1 gap-2"
          (click)="regenerar()"
          [disabled]="cargando"
        >
          <lucide-icon name="refresh-ccw" class="w-4 h-4"></lucide-icon>
          Regenerar Cronograma
        </button>
        <div class="flex gap-2 flex-1">
          <button type="button" class="btn btn-ghost rounded-2xl flex-1" (click)="cerrar.emit()">
            Cancelar
          </button>
          <button
            type="submit"
            class="btn btn-primary px-8 rounded-2xl shadow-lg shadow-primary/20 flex-1"
            [disabled]="cargando"
          >
            <span *ngIf="cargando" class="loading loading-spinner loading-xs"></span>
            Guardar
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<!-- Modal Confirmación Regenerar -->
<div
  *ngIf="showConfirmModal"
  class="fixed inset-0 z-[10000] pointer-events-auto flex items-center justify-center bg-black/40 backdrop-blur-sm"
>
  <div
    class="relative w-full max-w-sm m-4 p-8 rounded-3xl shadow-[0_8px_32px_0_rgba(0,0,0,0.3)] bg-base-100/60 backdrop-blur-xl border border-white/20 dark:border-white/5 animate-fade-in text-center overflow-hidden"
  >
    <!-- Fondo Decorativo Sutil -->
    <div
      class="absolute -top-10 -right-10 w-32 h-32 bg-warning/20 rounded-full blur-3xl pointer-events-none"
    ></div>

    <h3 class="font-bold text-xl text-base-content mb-4 flex items-center justify-center gap-2">
      <lucide-icon name="alert-triangle" class="w-6 h-6 text-warning"></lucide-icon>
      Regenerar Cronograma
    </h3>
    <p class="py-2 text-base-content/80 relative z-10 text-sm leading-relaxed">
      ¿Estás seguro de REGENERAR el cronograma? Esto borrará todas las cuotas actuales y creará
      nuevas basadas en el monto, plazo y tasa actuales.
    </p>
    <div class="mt-6 flex justify-center gap-4 relative z-10">
      <button
        class="btn btn-ghost hover:bg-base-content/10 border-transparent"
        (click)="showConfirmModal = false"
        type="button"
      >
        Cancelar
      </button>
      <button
        class="btn btn-warning text-warning-content shadow-lg shadow-warning/30"
        (click)="confirmarRegenerar()"
        type="button"
        [disabled]="cargando"
      >
        <span *ngIf="cargando" class="loading loading-spinner loading-xs"></span>
        Sí, regenerar
      </button>
    </div>
  </div>
</div>
