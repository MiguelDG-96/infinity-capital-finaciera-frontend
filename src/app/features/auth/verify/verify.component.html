<div 
  class="relative flex min-h-screen items-center justify-center bg-base-200 transition-colors duration-300 overflow-hidden"
  [attr.data-theme]="themeService.currentTheme()"
>
  <!-- Overlay de Animación (Centered Modal) -->
  <div 
    *ngIf="status() !== 'idle'"
    class="absolute inset-0 z-50 flex items-center justify-center bg-base-100/60 backdrop-blur-md animate-fade-in"
  >
    <div class="status-circle-container relative flex flex-col items-center justify-center gap-6 animate-pop">
          <!-- Spinner circular (solo en loading) -->
          <div 
            class="absolute inset-x-[-10px] inset-y-[-10px] rounded-full border-4 border-transparent border-t-primary animate-spin"
            *ngIf="status() === 'loading'"
          ></div>
          
          <!-- Círculo central -->
          <div 
            class="h-24 w-24 rounded-full flex flex-shrink-0 items-center justify-center transition-all duration-500 shadow-2xl z-10"
            [ngClass]="{
              'bg-primary text-primary-content shadow-primary/20': status() === 'loading',
              'bg-success text-success-content shadow-success/30 scale-110': status() === 'success',
              'bg-error text-error-content shadow-error/30 animate-shake': status() === 'error',
              'bg-base-300 text-base-content': status() === 'idle'
            }"
          >
            <lucide-icon *ngIf="status() === 'loading' || status() === 'idle'" name="mail" size="36" [class.animate-pulse]="status() === 'loading'"></lucide-icon>
            <lucide-icon *ngIf="status() === 'success'" name="check" size="48" class="animate-pop"></lucide-icon>
            <lucide-icon *ngIf="status() === 'error'" name="x" size="48" class="animate-pop"></lucide-icon>
          </div>

      <p class="text-xl font-bold text-base-content tracking-wide">
        {{ status() === 'loading' ? 'Verificando...' : status() === 'success' ? '¡Éxito!' : 'Código Incorrecto' }}
      </p>
    </div>
  </div>

  <div 
    class="w-full max-w-md p-8 bg-base-100 rounded-3xl shadow-xl border border-base-content/5 transition-all duration-500"
    [class.blur-sm]="status() !== 'idle'"
    [class.scale-95]="status() !== 'idle'"
    [class.opacity-50]="status() !== 'idle'"
  >
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="flex justify-center mb-4">
        <div class="p-4 bg-primary/10 rounded-2xl">
          <lucide-icon name="mail" size="48" class="text-primary"></lucide-icon>
        </div>
      </div>
      <h1 class="text-3xl font-bold text-base-content mb-2">Verifica tu correo</h1>
      <p class="text-base-content/60 text-sm px-4">
        Hemos enviado un código de 6 dígitos a <br>
        <span class="font-bold text-base-content">{{ email() }}</span>
      </p>
    </div>

    <!-- Messages -->
    <div *ngIf="errorMessage() && status() === 'idle'" class="mb-6 p-4 bg-error/10 border border-error/20 rounded-2xl flex items-center gap-3 animate-in">
      <lucide-icon name="alert-circle" size="20" class="text-error"></lucide-icon>
      <p class="text-xs text-error font-medium">{{ errorMessage() }}</p>
    </div>

    <div *ngIf="successMessage() && status() === 'idle'" class="mb-6 p-4 bg-info/10 border border-info/20 rounded-2xl flex items-center gap-3 animate-in">
      <lucide-icon name="sparkles" size="20" class="text-info"></lucide-icon>
      <p class="text-xs text-info font-medium">{{ successMessage() }}</p>
    </div>

    <!-- Form -->
    <form [formGroup]="verifyForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="space-y-2">
        <label class="text-sm font-bold text-base-content/70 ml-1">Código de verificación</label>
        <div class="relative">
          <input
            type="text"
            formControlName="codigo"
            placeholder="000000"
            maxlength="6"
            class="input input-bordered w-full h-14 text-center text-3xl tracking-[0.5em] font-bold rounded-2xl focus:input-primary transition-all bg-base-200/50 border-base-content/10"
            [class.input-error]="verifyForm.get('codigo')?.invalid && verifyForm.get('codigo')?.touched"
          />
        </div>
      </div>

      <button
        type="submit"
        [disabled]="verifyForm.invalid || status() !== 'idle'"
        class="btn btn-primary w-full h-14 rounded-2xl text-lg font-bold shadow-lg shadow-primary/20 hover:shadow-primary/40 transition-all flex items-center justify-center gap-3"
      >
        <lucide-icon name="check-circle2" size="24"></lucide-icon>
        Verificar cuenta
      </button>

      <div class="text-center pt-4">
        <p class="text-sm text-base-content/60">
          ¿No recibiste el código? 
          <button type="button" (click)="resendCode()" class="text-primary font-bold hover:underline">
            Reenviar código
          </button>
        </p>
      </div>
    </form>

    <!-- Footer -->
    <div class="mt-8 pt-6 border-t border-base-content/5 text-center">
      <a routerLink="/login" class="inline-flex items-center gap-2 text-sm font-medium text-base-content/40 hover:text-primary transition-colors">
        <lucide-icon name="arrow-left" size="16"></lucide-icon>
        Volver al inicio de sesión
      </a>
    </div>
  </div>
</div>
