<app-hero></app-hero>
<app-products></app-products>
<app-store></app-store>
<app-digital-channels></app-digital-channels>
<app-infinycapital-info></app-infinycapital-info>
<app-location></app-location>

<section class="py-24 bg-white border-t border-gray-100">
  <div class="container mx-auto px-4 text-center">
    <div class="max-w-2xl mx-auto">
      <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4 tracking-tight">
        Tu futuro financiero <span class="text-red-600 font-extrabold">comienza aquí</span>
      </h2>

      <p class="text-gray-500 text-lg mb-10">
        Préstamos rápidos, seguros y a tu medida con el respaldo de InfinyCapital.
      </p>

      <div class="flex flex-col sm:flex-row justify-center items-center gap-6">
        <a
          routerLink="/simulator"
          class="w-full sm:w-auto px-10 py-4 bg-red-600 text-white font-bold rounded-full hover:bg-red-700 transition-all shadow-lg shadow-red-600/10 active:scale-95"
        >
          Simular Préstamo
        </a>
        <a
          routerLink="/login"
          class="text-gray-500 font-bold hover:text-gray-900 transition-colors"
        >
          Iniciar Sesión
        </a>
      </div>

      <div class="mt-16 flex justify-center items-center gap-8 opacity-40">
        <div class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-gray-400">
          <lucide-icon name="shield-check" class="w-4 h-4"></lucide-icon>
          Seguro
        </div>
        <div class="w-1 h-1 bg-gray-300 rounded-full"></div>
        <div class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-gray-400">
          <lucide-icon name="zap" class="w-4 h-4"></lucide-icon>
          Rápido
        </div>
        <div class="w-1 h-1 bg-gray-300 rounded-full"></div>
        <div class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-gray-400">
          <lucide-icon name="award" class="w-4 h-4"></lucide-icon>
          Preferencial
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Promotional Popup Modal -->
<div *ngIf="showPopup" class="popup-backdrop fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6 bg-black/70">
  <div class="popup-content relative w-fit h-fit max-w-full max-h-[90vh] flex justify-center items-center">

    <!-- Close Button (Floating outside image) -->
    <button
      (click)="closePopup()"
      class="absolute -top-3 -right-3 md:-top-4 md:-right-4 z-20 bg-white hover:bg-gray-100 text-gray-900 rounded-full p-2 md:p-2.5 shadow-xl transition-transform hover:scale-110 cursor-pointer flex items-center justify-center"
    >
      <lucide-icon name="x" [size]="24" [strokeWidth]="3"></lucide-icon>
    </button>

    <!-- Image Link -->
    <a
      href="https://wa.me/51954862745?text=Hola%2C%20estoy%20interesado%20en%20conocer%20mi%20historial%20crediticio%20me%20brindar%C3%ADa%20mas%20informaci%C3%B3n%3F"
      target="_blank"
      rel="noopener noreferrer"
      class="block rounded-2xl md:rounded-3xl overflow-hidden shadow-[0_0_40px_rgba(220,38,38,0.2)] hover:shadow-[0_0_50px_rgba(220,38,38,0.4)] transition-shadow duration-300 group"
    >
      <img
        src="/products/historial-crediticio/banner-historial-crediticio.png"
        alt="Promoción Historial Crediticio"
        class="w-auto h-auto max-w-[90vw] md:max-w-[70vw] lg:max-w-2xl max-h-[85vh] object-contain block group-hover:scale-[1.02] transition-transform duration-500"
      />
    </a>

  </div>
</div>
