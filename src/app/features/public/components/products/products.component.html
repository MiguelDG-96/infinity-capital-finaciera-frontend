<div class="container max-w-7xl mx-auto px-4 relative z-20 py-12 -mt-16 md:-mt-24">
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-2 md:gap-6">
    @for (product of products; track product.title) {
      <div class="bg-white/60 p-4 rounded-[2rem] shadow-2xl shadow-gray-200/50 border border-white hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 flex flex-col justify-between h-full group cursor-pointer">
        
        <div class="flex items-start gap-2 mb-6">
          <div class="relative w-14 h-14 flex-shrink-0 flex items-center justify-center text-red-600">
            <!-- Fondo estático -->
            <div class="absolute inset-0 bg-red-50 shadow-inner rounded-full"></div>
            
            <!-- SVG Borde animado que se pinta por completo -->
            <svg class="absolute inset-0 w-full h-full rotate-180 pointer-events-none" viewBox="0 0 56 56">
              <circle cx="28" cy="28" r="27" fill="none" stroke="white" stroke-width="2"></circle>
              <circle cx="28" cy="28" r="27" fill="none" stroke="currentColor" stroke-width="2" 
                      class="text-red-600 transition-all duration-[600ms] ease-out [stroke-dasharray:170] [stroke-dashoffset:170] group-hover:[stroke-dashoffset:0]">
              </circle>
            </svg>

            <!-- Ícono central -->
            <lucide-icon [name]="product.iconName" [size]="24" [strokeWidth]="2" class="relative z-10"></lucide-icon>
          </div>
          <div class="flex flex-col pt-1">
            <h3 class="font-bold text-gray-900 text-sm md:text-base leading-tight mb-2 group-hover:text-red-600 transition-colors">{{ product.title }}</h3>
            <p class="text-xs md:text-sm text-gray-500 leading-snug">{{ product.subtitle }}</p>
          </div>
        </div>

        <a href="#" class="text-red-600 text-xs md:text-sm font-bold flex items-center gap-2 group-hover:gap-3 transition-all w-fit mt-auto">
          Conocer más <lucide-icon name="arrow-right" [size]="16" [strokeWidth]="3"></lucide-icon>
        </a>
      </div>
    }
  </div>
</div>
